# DO NOT COMMIT THIS FILE WITH REAL CREDENTIALS.
# Use SOPS, Sealed Secrets, or External Secrets Operator to manage these in
# git. The structure below is what the operator/build jobs expect; the values
# are placeholders.

---
# Secret 1: S3 credentials for fetching NVIDIA .run installer blobs.
#
# Key names below are what the operator expects (uppercase-snake). The chart's
# `s3.create=true` path renders these correctly, but production setups should
# manage credentials via SOPS / Sealed Secrets / External Secrets Operator and
# leave s3.create=false (as in helmrelease.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: s3-driver-storage-secret
  namespace: vgpu-driver-operator
type: Opaque
stringData:
  S3_ENDPOINT_URL: "https://s3.example.com"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"

---
# Secret 2: Registry pull credentials for build-job pods.
#
# WORKAROUND for Bug 6/8: the operator falls back to this Secret name as a
# default even when the CR omits `spec.registry.authSecretRef`. Until that's
# fixed, ship a stub with empty `auths`. Replace with real credentials if
# your registry requires auth and reference it via
# `spec.registry.authSecretRef.name` in the VGPUDriverImage CR.
apiVersion: v1
kind: Secret
metadata:
  name: private-registry-secret
  namespace: vgpu-driver-operator
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{}}
