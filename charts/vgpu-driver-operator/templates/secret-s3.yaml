{{- if .Values.s3.create -}}
{{- /*
  Production deployments should provision this Secret via external-secrets or
  sealed-secrets rather than passing credentials through Helm values.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.s3.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vgpu-driver-operator.labels" . | nindent 4 }}
type: Opaque
data:
  S3_ENDPOINT_URL: {{ .Values.s3.endpointUrl | b64enc | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | b64enc | quote }}
{{- end }}
