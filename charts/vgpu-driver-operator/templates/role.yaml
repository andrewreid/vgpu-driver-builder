apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vgpu-driver-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vgpu-driver-operator.labels" . | nindent 4 }}
rules:
  # Manage build Jobs in the operator's own namespace
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Watch pods created by build Jobs (for log tailing and status tracking)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Manage ConfigMaps for injecting build scripts into build Jobs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Read S3 and registry credential secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
