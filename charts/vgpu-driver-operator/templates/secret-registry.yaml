{{- if .Values.registry.create -}}
{{- /*
  Production deployments should provision this Secret via external-secrets or
  sealed-secrets rather than passing credentials through Helm values.
*/ -}}
{{- $dockerconfigjson := printf `{"auths":{%q:{"username":%q,"password":%q,"auth":%q}}}` .Values.registry.url .Values.registry.username .Values.registry.password (printf "%s:%s" .Values.registry.username .Values.registry.password | b64enc) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ required "registry.secretName is required when registry.create=true" .Values.registry.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vgpu-driver-operator.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $dockerconfigjson | b64enc | quote }}
{{- end }}
