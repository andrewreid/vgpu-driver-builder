apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vgpu-driver-operator.fullname" . }}
  labels:
    {{- include "vgpu-driver-operator.labels" . | nindent 4 }}
rules:
  # Read node metadata to match driver versions to nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # Full control over the VGPUDriverImage CRD instances, status, and finalizers
  - apiGroups: ["vgpu.flatcar.io"]
    resources: ["vgpudriverimages"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vgpu.flatcar.io"]
    resources: ["vgpudriverimages/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["vgpu.flatcar.io"]
    resources: ["vgpudriverimages/finalizers"]
    verbs: ["update"]

  # Read and emit Kubernetes events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]

  # Read CRD definitions at startup for kopf bootstrap
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
